services:
  stt-moonshine:
    build:
      context: .
    image: stt-moonshine:cuda124
    container_name: stt-moonshine
    restart: unless-stopped
    ports:
      - "${PORT:-8200}:8000"
    volumes:
      - ./data/cache:/data/cache
      - ./data/logs:/data/logs
    env_file:
      - .env
    networks:
      - stt-moonshine-net
      - freepbx-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    stop_grace_period: 30s
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  stt-moonshine-net:
    driver: bridge
    name: stt-moonshine-net
  freepbx-net:
    external: true
    name: freepbx-net
